<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Success</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      body {
        background: #fff7ed;
      }

      .success-card {
        border-radius: 24px;
      }

      .success-icon {
        width: 100px;
        height: 100px;
        background: #dcfce7;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: auto;
      }

      .success-icon i {
        font-size: 50px;
        color: #16a34a;
      }

      .detail-box {
        background: #f8fafc;
        border-radius: 14px;
        padding: 15px;
      }
    </style>
  </head>

  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card success-card border-0 shadow-lg p-5 text-center">
            <!-- Success Icon -->
            <div class="success-icon mb-4">
              <i class="bi bi-check-circle-fill"></i>
            </div>

            <!-- Success Heading -->
            <h1 class="text-success fw-bold mb-3">Payment Successful</h1>

            <p class="text-muted mb-4">
              Thank you for your generous contribution.
            </p>

            <!-- Donor Info -->
            <div class="detail-box mb-3">
              <h5 class="fw-bold mb-2">Donor Name</h5>

              <p class="mb-0">{{ name }}</p>
            </div>

            <!-- Amount -->
            <div class="detail-box mb-3">
              <h5 class="fw-bold mb-2">Donation Amount</h5>

              <p class="mb-0 text-success fw-bold">₹{{ amount }}</p>
            </div>

            <!-- Transaction -->
            <div class="detail-box mb-4">
              <h5 class="fw-bold mb-2">Transaction ID</h5>

              <p class="mb-0">{{ payment_id }}</p>
            </div>

            <!-- Buttons -->
            <div class="d-grid gap-3">
              <a href="/" class="btn btn-warning py-3 fw-bold">
                Donate Again
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
