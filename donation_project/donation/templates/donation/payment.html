<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      body {
        background: #fff7ed;
      }

      .payment-card {
        border-radius: 24px;
      }

      .pay-btn {
        height: 55px;
        font-size: 18px;
        border-radius: 14px;
      }

      .loader-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.9);
        z-index: 9999;
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }
    </style>
  </head>

  <body>
    <!-- Loader -->
    <div id="loader" class="loader-wrapper">
      <div class="spinner-border text-warning" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>

      <p class="mt-3 fw-bold">Processing Payment...</p>
    </div>

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card payment-card border-0 shadow-lg p-4">
            <h2 class="text-center fw-bold mb-4">Complete Payment</h2>

            <!-- Donor Details -->
            <div class="mb-3"><strong>Name:</strong> {{ name }}</div>

            <div class="mb-4">
              <strong>Amount:</strong>
              <span class="text-success fw-bold"> ₹{{ amount }} </span>
            </div>

            <!-- Payment Method -->
            <div class="mb-4">
              <label class="form-label fw-bold"> Select Payment Method </label>

              <select class="form-select form-select-lg">
                <option>UPI</option>
                <option>Credit Card</option>
                <option>Net Banking</option>
              </select>
            </div>

            <!-- Security Text -->
            <div
              class="alert alert-light border d-flex align-items-center gap-2"
            >
              <i class="bi bi-shield-check text-success"></i>

              <small>
                This is a secure dummy payment flow for assignment purposes.
              </small>
            </div>

            <!-- Payment Form -->
            <form method="POST" id="payment-form">
              {% csrf_token %}

              <button class="btn btn-warning w-100 fw-bold pay-btn">
                <i class="bi bi-lock-fill"></i>
                Pay Now
              </button>
            </form>

            <!-- Back Button -->
            <div class="text-center mt-3">
              <a href="/" class="text-decoration-none">
                ← Back To Donation Page
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Loader Script -->
    <script>
      const paymentForm = document.getElementById("payment-form");
      const loader = document.getElementById("loader");

      paymentForm.addEventListener("submit", () => {
        loader.style.display = "flex";
      });
    </script>
  </body>
</html>
