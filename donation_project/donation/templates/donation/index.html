{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donation Website</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body>
    <!-- Hero Section -->
    <section class="hero-section">
      <div class="container">
        <div class="row align-items-center min-vh-100">
          <!-- Left Content -->
          <div class="col-lg-6 mb-5 mb-lg-0">
            <h1 class="hero-title">Support A Noble Cause</h1>

            <p class="hero-subtitle">
              Your small contribution can create a big impact in someone's life.
            </p>
          </div>

          <!-- Donation Card -->
          <div class="col-lg-5 offset-lg-1">
            <div class="donation-card">
              <h3 class="text-center mb-4 fw-bold">Make a Donation</h3>

              <!-- Amount Buttons -->
              <div class="amount-section mb-4">
                <button type="button" class="amount-btn">101</button>
                <button type="button" class="amount-btn">501</button>
                <button type="button" class="amount-btn">1100</button>
                <button type="button" class="amount-btn">2100</button>
              </div>

              <!-- Donation Form -->
              <form method="POST" class="needs-validation" novalidate>
                {% csrf_token %}

                <!-- Name -->
                <div class="mb-3">
                  <input
                    type="text"
                    name="name"
                    class="form-control custom-input"
                    placeholder="Full Name"
                    required
                  />

                  <div class="invalid-feedback">
                    Please enter your full name.
                  </div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                  <input
                    type="email"
                    name="email"
                    class="form-control custom-input"
                    placeholder="Email Address"
                    required
                  />

                  <div class="invalid-feedback">
                    Please enter a valid email address.
                  </div>
                </div>

                <!-- Mobile -->
                <div class="mb-3">
                  <input
                    type="text"
                    name="mobile"
                    class="form-control custom-input"
                    placeholder="+91XXXXXXXXXX"
                    pattern="^\+91[0-9]{10}$"
                    maxlength="13"
                    required
                  />

                  <div class="invalid-feedback">
                    Enter mobile number in format +91XXXXXXXXXX
                  </div>
                </div>
                <!-- Amount -->
                <div class="mb-4">
                  <input
                    type="number"
                    id="amount-input"
                    name="amount"
                    class="form-control custom-input"
                    placeholder="Enter Amount"
                    required
                  />

                  <div class="invalid-feedback">
                    Please enter donation amount.
                  </div>
                </div>

                <button type="submit" class="donate-btn w-100">
                  Proceed To Donate
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Amount Selection -->
    <script>
      const amountButtons = document.querySelectorAll(".amount-btn");
      const amountInput = document.getElementById("amount-input");

      amountButtons.forEach((button) => {
        button.addEventListener("click", () => {
          amountButtons.forEach((btn) => {
            btn.classList.remove("active-amount");
          });

          button.classList.add("active-amount");

          amountInput.value = button.innerText;
        });
      });
    </script>

    <!-- Bootstrap Validation -->
    <script>
      (() => {
        "use strict";

        const forms = document.querySelectorAll(".needs-validation");

        Array.from(forms).forEach((form) => {
          form.addEventListener(
            "submit",
            (event) => {
              if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
              }

              form.classList.add("was-validated");
            },
            false,
          );
        });
      })();
    </script>
  </body>
</html>
